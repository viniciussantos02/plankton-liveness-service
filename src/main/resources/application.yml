spring:
  application:
    name: plankton-liveness-service
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

aws:
  region: us-east-1
  s3:
    bucket: plankton-liveness-biometrics
rekognition:
  liveness:
    confidence-threshold: 90.0
  face-match:
    similarity-threshold: 90.0
  image-quality:
    min-brightness: 40.0
    min-sharpness: 40.0
crypto:
  cpf-hash-secret: ${CPF_HASH_SECRET}
jwt:
  secret: ${JWT_SECRET}
  ttl-seconds: 300
